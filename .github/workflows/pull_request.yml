name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"

jobs:
  rust:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: 1.97.0

      - name: cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: build
        env:
          RUST_BACKTRACE: 1
        run: |
          cross build --release -p activator --target ${{ matrix.target }}
