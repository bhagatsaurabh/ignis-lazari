name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: 1.97.0

      - name: build
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo build --release -p activator --target ${{ matrix.target }}
