[package]
name = "activator"
version = "0.3.0"
edition = "2024"

[dependencies]
activator-core = { path = "../../crates/activator-core" }
config = { path = "../../crates/config" }
mock-provider = { path = "../../crates/mock-provider" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
